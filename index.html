<!DOCTYPE html>
<html lang="ja">
<head>
<background:
      radial-gradient(circle at 15% 0%, #FCE4EC 0%, transparent 55%),
      radial-gradient(circle at 100% 20%, #EDE3FA 0%, transparent 50%),
      var(--cream);
    min-height:100vh;
    color:var(--ink);
    -webkit-tap-highlight-color: transparent;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:20px 16px 32px;
  }
  header{
    text-align:center;
    padding:10px 0 18px;
  }
  header .kaomoji{
    font-size:28px;
    display:block;
    margin-bottom:2px;
  }
  header h1{
    font-size:26px;
    font-weight:900;
    margin:0;
    letter-spacing:0.04em;
    color:var(--ink);
  }
  header p{
    margin:4px 0 0;
    font-size:13px;
    color:var(--ink-soft);
  }

  /* タブ */
  .tabs{
    display:flex;
    gap:10px;
    margin-bottom:18px;
  }
  .tab{
    flex:1;
    border:none;
    border-radius:20px;
    padding:14px 0;
    font-family:inherit;
    font-size:18px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    opacity:0.45;
    transform:scale(0.97);
    transition:all 0.22s ease;
  }
  .tab.food{ background:linear-gradient(135deg, var(--pink), var(--pink-deep)); }
  .tab.misc{ background:linear-gradient(135deg, var(--lavender), var(--lavender-deep)); }
  .tab.active{
    opacity:1;
    transform:scale(1);
    box-shadow: var(--shadow);
  }
  .tab .count{
    font-size:13px;
    font-weight:500;
    background:rgba(255,255,255,0.35);
    padding:2px 9px;
    border-radius:12px;
  }

  /* 入力エリア */
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .add-row input{
    flex:1;
    border:2px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    font-size:18px;
    font-family:inherit;
    background:var(--card);
    color:var(--ink);
    outline:none;
    transition:border-color 0.2s;
  }
  .add-row input:focus{
    border-color:var(--pink-deep);
  }
  body.misc-mode .add-row input:focus{
    border-color:var(--lavender-deep);
  }
  .add-btn{
    width:52px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg, var(--pink), var(--pink-deep));
    color:#fff;
    font-size:26px;
    font-weight:700;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  body.misc-mode .add-btn{
    background:linear-gradient(135deg, var(--lavender), var(--lavender-deep));
  }

  /* リスト */
  .list-wrap{
    flex:1;
    background:var(--card);
    border-radius:22px;
    padding:8px;
    box-shadow:var(--shadow);
    min-height:220px;
  }
  ul.items{
    list-style:none;
    margin:0;
    padding:0;
  }
  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:16px;
    padding:40px 10px;
    line-height:1.8;
  }
  .empty .big{
    font-size:34px;
    display:block;
    margin-bottom:8px;
  }
  li.item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 12px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    user-select:none;
    animation: pop-in 0.25s ease;
  }
  li.item:last-child{ border-bottom:none; }
  @keyframes pop-in{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .basket{
    flex-shrink:0;
    width:30px; height:30px;
    border-radius:50%;
    border:2.5px solid var(--pink-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    transition:all 0.2s ease;
    background:#fff;
  }
  body.misc-mode .basket{ border-color:var(--lavender-deep); }
  li.item.done .basket{
    background:var(--pink-deep);
    border-color:var(--pink-deep);
    color:#fff;
  }
  body.misc-mode li.item.done .basket{
    background:var(--lavender-deep);
    border-color:var(--lavender-deep);
  }
  .item-name{
    flex:1;
    font-size:19px;
    font-weight:500;
    color:var(--ink);
    line-height:1.4;
    transition:all 0.2s ease;
  }
  li.item.done .item-name{
    color:var(--done);
    text-decoration: line-through;
    text-decoration-thickness: 2.5px;
    text-decoration-color: var(--pink-deep);
  }
  body.misc-mode li.item.done .item-name{
    text-decoration-color: var(--lavender-deep);
  }
  .del-one{
    flex-shrink:0;
    border:none;
    background:transparent;
    color:#D9C6CE;
    font-size:20px;
    cursor:pointer;
    padding:4px 6px;
  }

  /* 下部アクション */
  .footer-actions{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .clear-btn{
    border:none;
    border-radius:18px;
    padding:16px;
    font-family:inherit;
    font-size:17px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,#F6B8B0,#EE8E9A);
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:opacity 0.2s;
  }
  .clear-btn:disabled{
    opacity:0.35;
    cursor:not-allowed;
    box-shadow:none;
  }
  .hint{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:26px;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:12px 22px;
    border-radius:20px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:all 0.3s ease;
    white-space:nowrap;
  }
  .toast.show{
    opacity:0.92;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="kaomoji">🛍️</span>
    <h1>あやかのお買い物メモ</h1>
    <p>買ったら丸をタップしてね</p>
  </header>

  <div class="tabs">
    <button class="tab food active" data-cat="food" onclick="switchTab('food')">
      🍓 食品 <span class="count" id="count-food">0</span>
    </button>
    <button class="tab misc" data-cat="misc" onclick="switchTab('misc')">
      🧴 雑貨 <span class="count" id="count-misc">0</span>
    </button>
  </div>

  <div class="add-row">
    <input type="text" id="new-item" placeholder="品物を入力してね" maxlength="40">
    <button class="add-btn" onclick="addItem()">＋</button>
  </div>

  <div class="list-wrap">
    <ul class="items" id="item-list"></ul>
  </div>

  <div class="footer-actions">
    <button class="clear-btn" id="clear-btn" onclick="clearDone()">🗑️ 買った物をまとめて削除</button>
    <button class="clear-btn" id="notify-test-btn" onclick="testNotification()" style="background:linear-gradient(135deg,#C9B7EA,#B39DE0);">🔔 通知テストを送る</button>
    <div class="hint">丸タップで購入済み／ゴミ箱アイコンで1件だけ削除</div>
    <div class="hint" id="badge-debug" style="font-size:11px; opacity:0.7;">バッジ診断: 確認中...</div>
    <div class="hint" id="notify-debug" style="font-size:11px; opacity:0.7;">通知診断: 未実行</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { food: [], misc: [] };
let currentCat = 'food';

// ホーム画面アイコンに未購入件数のバッジを表示する(対応ブラウザのみ)
function updateBadge(){
  const total = state.food.filter(x => !x.done).length + state.misc.filter(x => !x.done).length;
  const dbg = document.getElementById('badge-debug');

  if(!('setAppBadge' in navigator)){
    if(dbg) dbg.textContent = 'バッジ診断: この環境はBadging API非対応(setAppBadgeが存在しません)';
    return;
  }

  const action = total > 0 ? navigator.setAppBadge(total) : navigator.clearAppBadge();
  action.then(() => {
    if(dbg) dbg.textContent = `バッジ診断: API呼び出し成功(件数=${total})/ ${new Date().toLocaleTimeString()}`;
  }).catch((e) => {
    if(dbg) dbg.textContent = `バッジ診断: API呼び出し失敗 → ${e.name}: ${e.message}`;
  });
}

// PWAとして正式インストールできるようにするためのサービスワーカー登録
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(e => {
      console.log('サービスワーカー登録に失敗しました:', e);
    });
  });
}

// 実際の通知を1回送ってみて、バッジ表示が連動するか確認するテスト
async function testNotification(){
  const ndbg = document.getElementById('notify-debug');
  if(!('Notification' in window)){
    ndbg.textContent = '通知診断: この環境は通知機能(Notification API)非対応';
    return;
  }

  try{
    let permission = Notification.permission;
    if(permission === 'default'){
      permission = await Notification.requestPermission();
    }

    if(permission !== 'granted'){
      ndbg.textContent = `通知診断: 権限が許可されませんでした(状態=${permission})`;
      return;
    }

    if(!('serviceWorker' in navigator)){
      ndbg.textContent = '通知診断: サービスワーカー非対応のため通知を出せません';
      return;
    }

    const reg = await navigator.serviceWorker.ready;
    await reg.showNotification('あやかのお買い物メモ', {
      body: 'テスト通知です。これが表示されたら通知は成功しています。',
      icon: 'icon-180.png',
      badge: 'icon-180.png',
      tag: 'test-notification'
    });

    ndbg.textContent = `通知診断: 通知の送信に成功しました(${new Date().toLocaleTimeString()})。数秒後にバッジも再送信します`;

    // 通知の後、少し待ってからバッジを再送信して連動するか確認
    setTimeout(() => {
      updateBadge();
    }, 2000);

  }catch(e){
    ndbg.textContent = `通知診断: エラー発生 → ${e.name}: ${e.message}`;
  }
}

loadState();
</script>
</body>
</html>
