<style>
  :root{
    --pink:#F8AEC1;
    --pink-deep:#F192AA;
    --lavender:#C9B7EA;
    --lavender-deep:#B39DE0;
    --cream:#FFF7F4;
    --card:#FFFDFC;
    --ink:#5A4453;
    --ink-soft:#8A7686;
    --line:#F1E3E9;
    --done:#C8BCC5;
    --shadow: 0 8px 24px rgba(226,150,175,0.18);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Zen Maru Gothic', sans-serif;
    background:
      radial-gradient(circle at 15% 0%, #FCE4EC 0%, transparent 55%),
      radial-gradient(circle at 100% 20%, #EDE3FA 0%, transparent 50%),
      var(--cream);
    min-height:100vh;
    color:var(--ink);
    -webkit-tap-highlight-color: transparent;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding:20px 16px 32px;
  }
  header{
    text-align:center;
    padding:10px 0 18px;
  }
  header .kaomoji{
    font-size:28px;
    display:block;
    margin-bottom:2px;
  }
  header h1{
    font-size:26px;
    font-weight:900;
    margin:0;
    letter-spacing:0.04em;
    color:var(--ink);
  }
  header p{
    margin:4px 0 0;
    font-size:13px;
    color:var(--ink-soft);
  }

  /* タブ */
  .tabs{
    display:flex;
    gap:10px;
    margin-bottom:18px;
  }
  .tab{
    flex:1;
    border:none;
    border-radius:20px;
    padding:14px 0;
    font-family:inherit;
    font-size:18px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    opacity:0.45;
    transform:scale(0.97);
    transition:all 0.22s ease;
  }
  .tab.food{ background:linear-gradient(135deg, var(--pink), var(--pink-deep)); }
  .tab.misc{ background:linear-gradient(135deg, var(--lavender), var(--lavender-deep)); }
  .tab.active{
    opacity:1;
    transform:scale(1);
    box-shadow: var(--shadow);
  }
  .tab .count{
    font-size:13px;
    font-weight:500;
    background:rgba(255,255,255,0.35);
    padding:2px 9px;
    border-radius:12px;
  }

  /* 入力エリア */
  .add-row{
    display:flex;
    gap:8px;
    margin-bottom:16px;
  }
  .add-row input{
    flex:1;
    border:2px solid var(--line);
    border-radius:16px;
    padding:14px 16px;
    font-size:18px;
    font-family:inherit;
    background:var(--card);
    color:var(--ink);
    outline:none;
    transition:border-color 0.2s;
  }
  .add-row input:focus{
    border-color:var(--pink-deep);
  }
  body.misc-mode .add-row input:focus{
    border-color:var(--lavender-deep);
  }
  .add-btn{
    width:52px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg, var(--pink), var(--pink-deep));
    color:#fff;
    font-size:26px;
    font-weight:700;
    cursor:pointer;
    box-shadow:var(--shadow);
  }
  body.misc-mode .add-btn{
    background:linear-gradient(135deg, var(--lavender), var(--lavender-deep));
  }

  /* リスト */
  .list-wrap{
    flex:1;
    background:var(--card);
    border-radius:22px;
    padding:8px;
    box-shadow:var(--shadow);
    min-height:220px;
  }
  ul.items{
    list-style:none;
    margin:0;
    padding:0;
  }
  .empty{
    text-align:center;
    color:var(--ink-soft);
    font-size:16px;
    padding:40px 10px;
    line-height:1.8;
  }
  .empty .big{
    font-size:34px;
    display:block;
    margin-bottom:8px;
  }
  li.item{
    display:flex;
    align-items:center;
    gap:14px;
    padding:16px 12px;
    border-bottom:1px solid var(--line);
    cursor:pointer;
    user-select:none;
    animation: pop-in 0.25s ease;
  }
  li.item:last-child{ border-bottom:none; }
  @keyframes pop-in{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .basket{
    flex-shrink:0;
    width:30px; height:30px;
    border-radius:50%;
    border:2.5px solid var(--pink-deep);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:15px;
    transition:all 0.2s ease;
    background:#fff;
  }
  body.misc-mode .basket{ border-color:var(--lavender-deep); }
  li.item.done .basket{
    background:var(--pink-deep);
    border-color:var(--pink-deep);
    color:#fff;
  }
  body.misc-mode li.item.done .basket{
    background:var(--lavender-deep);
    border-color:var(--lavender-deep);
  }
  .item-name{
    flex:1;
    font-size:19px;
    font-weight:500;
    color:var(--ink);
    line-height:1.4;
    transition:all 0.2s ease;
  }
  li.item.done .item-name{
    color:var(--done);
    text-decoration: line-through;
    text-decoration-thickness: 2.5px;
    text-decoration-color: var(--pink-deep);
  }
  body.misc-mode li.item.done .item-name{
    text-decoration-color: var(--lavender-deep);
  }
  .del-one{
    flex-shrink:0;
    border:none;
    background:transparent;
    color:#D9C6CE;
    font-size:20px;
    cursor:pointer;
    padding:4px 6px;
  }

  /* 下部アクション */
  .footer-actions{
    margin-top:18px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .clear-btn{
    border:none;
    border-radius:18px;
    padding:16px;
    font-family:inherit;
    font-size:17px;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg,#F6B8B0,#EE8E9A);
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:opacity 0.2s;
  }
  .clear-btn:disabled{
    opacity:0.35;
    cursor:not-allowed;
    box-shadow:none;
  }
  .hint{
    text-align:center;
    font-size:12px;
    color:var(--ink-soft);
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:26px;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:12px 22px;
    border-radius:20px;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:all 0.3s ease;
    white-space:nowrap;
  }
  .toast.show{
    opacity:0.92;
    transform:translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="kaomoji">🛍️</span>
    <h1>あやかのお買い物メモ</h1>
    <p>買ったら丸をタップしてね</p>
  </header>

  <div class="tabs">
    <button class="tab food active" data-cat="food" onclick="switchTab('food')">
      🍓 食品 <span class="count" id="count-food">0</span>
    </button>
    <button class="tab misc" data-cat="misc" onclick="switchTab('misc')">
      🧴 雑貨 <span class="count" id="count-misc">0</span>
    </button>
  </div>

  <div class="add-row">
    <input type="text" id="new-item" placeholder="品物を入力してね" maxlength="40">
    <button class="add-btn" onclick="addItem()">＋</button>
  </div>

  <div class="list-wrap">
    <ul class="items" id="item-list"></ul>
  </div>

  <div class="footer-actions">
    <button class="clear-btn" id="clear-btn" onclick="clearDone()">🗑️ 買った物をまとめて削除</button>
    <div class="hint">丸タップで購入済み／ゴミ箱アイコンで1件だけ削除</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let state = { food: [], misc: [] };
let currentCat = 'food';
let idCounter = 1;

function uid(){ return 'i' + (idCounter++) + '-' + Date.now(); }

function loadState(){
  try{
    const raw = localStorage.getItem('shopping-state');
    if(raw){
      const parsed = JSON.parse(raw);
      state.food = parsed.food || [];
      state.misc = parsed.misc || [];
      const maxId = [...state.food, ...state.misc].length;
      idCounter = maxId + 1;
    }
  }catch(e){
    // 初回起動、または読み込み失敗。空の状態で開始。
    console.log('初回起動、または読み込み失敗:', e);
  }
  render();
}

function saveState(){
  try{
    localStorage.setItem('shopping-state', JSON.stringify(state));
  }catch(e){
    console.error('保存に失敗しました:', e);
    showToast('⚠️ 保存に失敗しました');
  }
}

function switchTab(cat){
  currentCat = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab.' + (cat==='food' ? 'food' : 'misc')).classList.add('active');
  document.body.classList.toggle('misc-mode', cat === 'misc');
  document.getElementById('new-item').placeholder = cat === 'food' ? '食品を入力してね' : '雑貨を入力してね';
  render();
}

function addItem(){
  const input = document.getElementById('new-item');
  const name = input.value.trim();
  if(!name) return;
  state[currentCat].push({ id: uid(), name: name, done: false });
  input.value = '';
  saveState();
  render();
  input.focus();
}

document.getElementById('new-item').addEventListener('keydown', function(e){
  if(e.key === 'Enter') addItem();
});

function toggleDone(id){
  const list = state[currentCat];
  const it = list.find(x => x.id === id);
  if(it){ it.done = !it.done; }
  saveState();
  render();
}

function deleteOne(id){
  state[currentCat] = state[currentCat].filter(x => x.id !== id);
  saveState();
  render();
}

function clearDone(){
  const doneCount = state[currentCat].filter(x => x.done).length;
  if(doneCount === 0) return;
  state[currentCat] = state[currentCat].filter(x => !x.done);
  saveState();
  render();
  showToast(doneCount + '件 削除しました');
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 1600);
}

function render(){
  const list = state[currentCat];
  const ul = document.getElementById('item-list');
  document.getElementById('count-food').textContent = state.food.filter(x=>!x.done).length;
  document.getElementById('count-misc').textContent = state.misc.filter(x=>!x.done).length;

  const doneCount = list.filter(x => x.done).length;
  document.getElementById('clear-btn').disabled = doneCount === 0;

  if(list.length === 0){
    ul.innerHTML = '<div class="empty"><span class="big">🌸</span>まだ何もありません<br>下の欄から追加してね</div>';
    return;
  }

  ul.innerHTML = list.map(it => `
    <li class="item ${it.done ? 'done' : ''}" onclick="toggleDone('${it.id}')">
      <span class="basket">${it.done ? '✓' : ''}</span>
      <span class="item-name">${escapeHtml(it.name)}</span>
      <button class="del-one" onclick="event.stopPropagation(); deleteOne('${it.id}')">✕</button>
    </li>
  `).join('');
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

loadState();
</script>
</body>
</html>
